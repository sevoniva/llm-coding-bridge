name: Publish Package

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false
      - run: npm ci
      - run: npm run lint
      - run: npm run security:scan
      - run: npm run secretlint
      - run: npm run repo:gate
      - run: npm run sca
      - run: npm test
      - name: Skip if version already published
        id: skip_check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@sevoniva/llm-coding-bridge@$VERSION" version >/dev/null 2>&1; then
            echo "Version $VERSION is already on npm. Skipping publish."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Version $VERSION not on npm. Will publish."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.skip_check.outputs.skip == 'false'
        run: npm publish --provenance

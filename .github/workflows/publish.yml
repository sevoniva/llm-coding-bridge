name: Publish Package

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false
      - run: npm ci
      - name: Verify tag matches package version
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./package.json').version")
          test "$GITHUB_REF_NAME" = "v$VERSION"
      - run: npm run verify
      - run: npm run release:gate -- --release --tag "$GITHUB_REF_NAME"
      - run: npm pack --dry-run
      - name: Check published version
        id: published
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@sevoniva/llm-coding-bridge@$VERSION" version --registry=https://registry.npmjs.org/ >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.published.outputs.exists == 'false'
        run: npm publish --provenance --access public --registry=https://registry.npmjs.org/
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
